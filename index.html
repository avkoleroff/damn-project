<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Айзек ви лав ю</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: #e5e7eb;
    }
    .card {
      width: 100%;
      max-width: 400px;
      padding: 24px 24px 20px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow:
        0 24px 80px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(18px);
    }
    .card-header {
      margin-bottom: 18px;
    }
    .title {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .form-group {
      margin-bottom: 14px;
    }
    label {
      display: block;
      font-size: 0.8rem;
      margin-bottom: 6px;
      color: #9ca3af;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    input:focus, select:focus, textarea:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.7);
      background: #020617;
    }
    select, textarea {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    textarea { min-height: 60px; resize: vertical; }
    button {
      width: 100%;
      margin-top: 4px;
      padding: 9px 12px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      background: #0369a1;
      color: #e5e7eb;
      transition: background-color 0.12s ease;
    }
    button:hover {
      background: #7dd3fc;
    }
    button:active {
      background: #38bdf8;
    }
    .register-btn {
      margin-top: 10px;
    }
    .status {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #9ca3af;
      min-height: 18px;
    }
    .status.error {
      color: #fca5a5;
    }
    .status.ok {
      color: #bbf7d0;
    }
    .face {
      margin-top: 16px;
      font-size: 3.2rem;
      text-align: center;
      text-shadow: 0 0 26px rgba(244, 114, 182, 0.65);
    }
    .face img {
      display: block;
      margin: 0 auto;
      max-width: 100%;
      height: auto;
      border-radius: 14px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.9);
      object-fit: contain;
    }
    .role {
      margin-top: 6px;
      text-align: center;
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .search-page {
      display: none;
      width: 100%;
      max-width: 600px;
      padding: 32px 28px 28px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow:
        0 24px 80px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.15);
    }
    .logout-btn {
      position: fixed;
      top: 16px;
      right: 16px;
      width: auto;
      padding-inline: 16px;
      font-size: 0.85rem;
    }
    .search-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 18px;
    }
    .search-box {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    .search-box input {
      flex: 1;
    }
    .search-box button {
      width: auto;
      padding-inline: 18px;
    }
    .search-results {
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.9rem;
    }
    .search-card {
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.35);
    }
    .search-card-title {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .search-card-sub {
      color: #9ca3af;
    }
    .results-page {
      display: none;
      width: 100%;
      max-width: 720px;
      padding: 28px 24px 24px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.9);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.9), 0 0 0 1px rgba(148, 163, 184, 0.15);
    }
    .results-page.visible {
      display: block;
    }
    .search-page.hidden {
      display: none;
    }
    .results-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .results-page-title {
      font-size: 1.35rem;
      font-weight: 600;
    }
    .results-page-back {
      width: auto;
      padding-inline: 16px;
      font-size: 0.9rem;
    }
    .results-page-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .results-card {
      padding: 20px 18px;
      border-radius: 14px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.35);
      font-size: 1rem;
    }
    .results-card-name {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .results-card-spec {
      color: #9ca3af;
      font-size: 1rem;
    }
    .results-page-empty {
      text-align: center;
      color: #9ca3af;
      padding: 24px;
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      overflow-y: auto;
      padding: 20px;
    }
    .modal {
      width: 100%;
      max-width: 380px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      padding: 20px 20px 18px;
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.98);
      box-shadow:
        0 24px 80px rgba(15, 23, 42, 0.9),
        0 0 0 1px rgba(148, 163, 184, 0.25);
      margin: auto;
    }
    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .modal-actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
    }
    .modal-actions button {
      flex: 1;
    }
    .nav-links { position: fixed; top: 16px; right: 16px; display: flex; gap: 8px; align-items: center; z-index: 5; }
    .nav-links a, .nav-links .nav-btn { padding: 8px 14px; border-radius: 999px; background: #0369a1; color: #e5e7eb; text-decoration: none; font-size: 0.85rem; cursor: pointer; border: none; }
    .nav-links a:hover, .nav-links .nav-btn:hover { background: #7dd3fc; color: #0b1120; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 14px; }
    .filter-row label { margin: 0; margin-right: 4px; }
    .filter-row input, .filter-row select { width: auto; min-width: 90px; }
    .filter-row .sort-wrap { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    .profile-page, .favorites-page, .cabinet-page { display: none; width: 100%; max-width: 640px; padding: 24px; border-radius: 18px; background: rgba(15,23,42,0.9); box-shadow: 0 24px 80px rgba(15,23,42,0.9), 0 0 0 1px rgba(148,163,184,0.15); }
    .profile-page.visible, .favorites-page.visible, .cabinet-page.visible { display: block; }
    .profile-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .profile-name { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
    .profile-meta { color: #9ca3af; font-size: 0.95rem; margin-bottom: 12px; }
    .profile-about { margin: 16px 0; padding: 12px; border-radius: 10px; background: rgba(2,6,23,0.6); font-size: 0.95rem; line-height: 1.5; }
    .profile-price { font-size: 1.1rem; font-weight: 600; color: #7dd3fc; margin-bottom: 16px; }
    .profile-contact { margin-bottom: 16px; font-size: 0.95rem; color: #9ca3af; }
    .profile-contact a { color: #7dd3fc; }
    .rating-stars { color: #fbbf24; margin-bottom: 8px; }
    .reviews-list { margin-top: 16px; }
    .review-item { padding: 10px 0; border-bottom: 1px solid rgba(148,163,184,0.2); font-size: 0.9rem; }
    .review-item:last-child { border-bottom: none; }
    .review-author { color: #9ca3af; font-size: 0.8rem; margin-bottom: 4px; }
    .review-form { margin-top: 16px; }
    .review-form textarea { margin-bottom: 8px; }
    .favorite-btn { width: auto; padding-inline: 16px; }
    .favorite-btn.in-favorites { background: #a855f7; }
    .results-card, .search-card { cursor: pointer; }
    .results-card:hover, .search-card:hover { border-color: #38bdf8; }
    .card-price { color: #7dd3fc; font-size: 0.9rem; margin-top: 4px; }
    .card-rating { color: #fbbf24; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <div class="title">Вход на сайт</div>
    </div>

    <div class="form-group">
      <label for="username">Логин</label>
      <input id="username" autocomplete="off" />
    </div>

    <div class="form-group">
      <label for="password">Пароль</label>
      <input id="password" type="password" />
    </div>

    <button id="login-btn">Войти</button>
    <button id="register-user-btn" class="register-btn">Регистрация (как пользователь)</button>
    <button id="register-worker-btn" class="register-btn">Регистрация (как специалист)</button>

    <div id="status" class="status"></div>
    <div id="face" class="face" style="display:none"></div>
    <div id="role" class="role" style="display:none"></div>
  </div>

  <div id="search-page" class="search-page">
    <div class="search-title">Поиск</div>
    <div id="filter-row" class="filter-row">
      <label>Тип:</label>
      <select id="filter-kind">
        <option value="">Все</option>
        <option value="tutor">Репетитор</option>
        <option value="master">Мастер по ремонту</option>
      </select>
      <label>Город:</label>
      <input id="filter-city" type="text" placeholder="Город" />
      <label>Цена от:</label>
      <input id="filter-price-min" type="number" min="0" placeholder="0" />
      <label>до:</label>
      <input id="filter-price-max" type="number" min="0" placeholder="—" />
      <div class="sort-wrap">
        <label>Сортировка:</label>
        <select id="sort-by">
          <option value="rating">По рейтингу</option>
          <option value="priceAsc">Сначала дешевле</option>
          <option value="priceDesc">Сначала дороже</option>
          <option value="name">По имени</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label for="search-input">Что ищем?</label>
      <div class="search-box">
        <input id="search-input" autocomplete="off" placeholder="..." />
        <button id="search-btn">Искать</button>
      </div>
    </div>
    <div id="search-results" class="search-results"></div>
  </div>

  <div id="results-page" class="results-page">
    <div class="results-page-header">
      <div class="results-page-title">Найденные специалисты</div>
      <button id="results-back-btn" class="results-page-back">Назад к поиску</button>
    </div>
    <div id="results-page-list" class="results-page-list"></div>
  </div>

  <div id="profile-page" class="profile-page">
    <div class="profile-header">
      <div>
        <div id="profile-name" class="profile-name"></div>
        <div id="profile-meta" class="profile-meta"></div>
        <div id="profile-price" class="profile-price"></div>
        <div id="profile-rating" class="rating-stars"></div>
      </div>
      <button id="profile-back-btn" class="results-page-back">Назад</button>
    </div>
    <div id="profile-about" class="profile-about"></div>
    <div id="profile-contact" class="profile-contact"></div>
    <button id="profile-favorite-btn" class="favorite-btn">В избранное</button>
    <h4 style="margin-top:20px">Отзывы</h4>
    <div id="profile-reviews" class="reviews-list"></div>
    <div id="review-form" class="review-form" style="display:none">
      <label>Ваша оценка (1–5):</label>
      <input id="review-rating" type="number" min="1" max="5" value="5" />
      <textarea id="review-text" placeholder="Текст отзыва"></textarea>
      <button id="review-submit">Отправить отзыв</button>
    </div>
  </div>

  <div id="favorites-page" class="favorites-page">
    <div class="results-page-header">
      <div class="results-page-title">Избранное</div>
      <button id="favorites-back-btn" class="results-page-back">Назад к поиску</button>
    </div>
    <div id="favorites-list" class="results-page-list"></div>
  </div>

  <div id="cabinet-page" class="cabinet-page">
    <div class="results-page-header">
      <div class="results-page-title">Мой кабинет</div>
      <button id="cabinet-logout-btn" class="results-page-back">Выйти</button>
    </div>
    <div class="form-group">
      <label>Имя</label>
      <input id="cabinet-name" />
    </div>
    <div class="form-group">
      <label>Отчество</label>
      <input id="cabinet-patronymic" />
    </div>
    <div class="form-group">
      <label>Город</label>
      <input id="cabinet-city" />
    </div>
    <div id="cabinet-worker-fields" style="display:none">
      <div class="form-group">
        <label>Стоимость (₽)</label>
        <input id="cabinet-price" type="number" min="0" />
      </div>
      <div class="form-group">
        <label>О себе</label>
        <textarea id="cabinet-about"></textarea>
      </div>
      <div class="form-group">
        <label>Тип</label>
        <select id="cabinet-kind"><option value="tutor">Репетитор</option><option value="master">Мастер по ремонту</option></select>
      </div>
      <div class="form-group">
        <label>Специальность</label>
        <select id="cabinet-specialty"></select>
      </div>
      <div class="form-group">
        <label>Telegram</label>
        <input id="cabinet-telegram" autocomplete="off" placeholder="@username" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="cabinet-email" type="email" autocomplete="off" />
      </div>
    </div>
    <button id="cabinet-save-btn">Сохранить</button>
    <h4 style="margin-top:20px">Отзывы обо мне</h4>
    <div id="cabinet-reviews" class="reviews-list"></div>
  </div>

  <div id="register-modal" class="modal-backdrop" style="display:none">
    <div class="modal">
      <div class="modal-title">Регистрация</div>

      <div class="form-group">
        <label for="reg-username">Логин</label>
        <input id="reg-username" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="reg-name">Имя</label>
        <input id="reg-name" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="reg-patronymic">Отчество (необязательно)</label>
        <input id="reg-patronymic" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="reg-city">Город</label>
        <input id="reg-city" autocomplete="off" placeholder="Например: Москва" />
      </div>

      <div class="form-group">
        <label for="reg-password">Пароль</label>
        <input id="reg-password" type="password" />
      </div>

      <div class="form-group">
        <label for="reg-password2">Повторите пароль</label>
        <input id="reg-password2" type="password" />
      </div>

      <div id="worker-extra" style="display:none">
        <div class="form-group">
          <label for="worker-kind">Тип специалиста</label>
          <select id="worker-kind">
            <option value="tutor">Репетитор</option>
            <option value="master">Мастер по ремонту</option>
          </select>
        </div>

        <div class="form-group">
          <label for="worker-specialty">Узкая специализация</label>
          <select id="worker-specialty">
            <!-- варианты подставляются скриптом -->
          </select>
        </div>
        <div class="form-group">
          <label for="reg-price">Стоимость (₽/час или за услугу)</label>
          <input id="reg-price" type="number" min="0" placeholder="1500" />
        </div>
        <div class="form-group">
          <label for="reg-about">О себе</label>
          <textarea id="reg-about" placeholder="Кратко расскажите о себе и опыте"></textarea>
        </div>
        <div class="form-group">
          <label for="reg-city-worker">Город</label>
          <input id="reg-city-worker" autocomplete="off" placeholder="Например: Москва" />
        </div>
        <div class="form-group">
          <label for="reg-telegram">Telegram</label>
          <input id="reg-telegram" autocomplete="off" placeholder="@username или ссылка" />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" autocomplete="off" placeholder="example@mail.ru" />
        </div>
      </div>

      <div id="register-status" class="status"></div>

      <div class="modal-actions">
        <button id="register-confirm-btn">Создать</button>
        <button id="register-cancel-btn">Отмена</button>
      </div>
    </div>
  </div>

    function getFilteredWorkers() {
      const query = searchInput.value.trim().toLowerCase();
      let list = Object.entries(users)
        .filter(([_, u]) => u.role === "worker")
        .map(([username, w]) => ({ username, ...w, rating: getAverageRating(username) }));
      if (query) {
        list = list.filter((w) => w.specialty && w.specialty.toLowerCase().includes(query));
      }
      if (filterKind && filterKind.value) list = list.filter((w) => w.kind === filterKind.value);
      if (filterCity && filterCity.value.trim()) {
        const city = filterCity.value.trim().toLowerCase();
        list = list.filter((w) => (w.city || "").toLowerCase().includes(city));
      }
      if (filterPriceMin && filterPriceMin.value !== "") {
        const min = parseInt(filterPriceMin.value, 10);
        if (!isNaN(min)) list = list.filter((w) => (w.price || 0) >= min);
      }
      if (filterPriceMax && filterPriceMax.value !== "") {
        const max = parseInt(filterPriceMax.value, 10);
        if (!isNaN(max)) list = list.filter((w) => (w.price || 0) <= max);
      }
      const sort = sortBy ? sortBy.value : "rating";
      if (sort === "rating") list.sort((a, b) => (b.rating || 0) - (a.rating || 0));
      else if (sort === "priceAsc") list.sort((a, b) => (a.price || 0) - (b.price || 0));
      else if (sort === "priceDesc") list.sort((a, b) => (b.price || 0) - (a.price || 0));
      else if (sort === "name") list.sort((a, b) => (a.name || "").localeCompare(b.name || ""));
      return list;
    }

    function performSearch() {
      const query = searchInput.value.trim().toLowerCase();
      searchResultsEl.innerHTML = "";
      if (!query) return;

      const filtered = getFilteredWorkers();
      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.textContent = "Ничего не найдено";
        searchResultsEl.appendChild(empty);
        return;
      }

      filtered.forEach((w) => {
        const card = document.createElement("div");
        card.className = "search-card";
        card.dataset.username = w.username;
        const fullName = w.patronymic ? `${w.name} ${w.patronymic}` : (w.name || "Без имени");
        const title = document.createElement("div");
        title.className = "search-card-title";
        title.textContent = fullName;
        const sub = document.createElement("div");
        sub.className = "search-card-sub";
        const kindLabel = KIND_LABELS[w.kind] || "Специалист";
        sub.textContent = `${kindLabel} — ${w.specialty}`;
        card.appendChild(title);
        card.appendChild(sub);
        if (w.price) { const p = document.createElement("div"); p.className = "card-price"; p.textContent = (w.price + " ₽/час"); card.appendChild(p); }
        if (w.rating) { const r = document.createElement("div"); r.className = "card-rating"; r.textContent = "★ " + w.rating; card.appendChild(r); }
        card.addEventListener("click", () => { profileFromResults = false; openProfile(w.username); });
        searchResultsEl.appendChild(card);
      });
    }

    function openResultsPage() {
      const filtered = getFilteredWorkers();
      resultsPageListEl.innerHTML = "";

      if (filtered.length === 0) {
        const empty = document.createElement("div");
        empty.className = "results-page-empty";
        empty.textContent = "Ничего не найдено. Введите запрос и нажмите «Искать».";
        resultsPageListEl.appendChild(empty);
      } else {
        filtered.forEach((w) => {
          const card = document.createElement("div");
          card.className = "results-card";
          card.dataset.username = w.username;
          const fullName = w.patronymic ? `${w.name} ${w.patronymic}` : (w.name || "Без имени");
          const nameEl = document.createElement("div");
          nameEl.className = "results-card-name";
          nameEl.textContent = fullName;
          const specEl = document.createElement("div");
          specEl.className = "results-card-spec";
          const kindLabel = KIND_LABELS[w.kind] || "Специалист";
          specEl.textContent = `${kindLabel} — ${w.specialty}`;
          card.appendChild(nameEl);
          card.appendChild(specEl);
          if (w.price) { const p = document.createElement("div"); p.className = "card-price"; p.textContent = (w.price + " ₽/час"); card.appendChild(p); }
          if (w.rating) { const r = document.createElement("div"); r.className = "card-rating"; r.textContent = "★ " + w.rating; card.appendChild(r); }
          card.addEventListener("click", () => { profileFromResults = true; openProfile(w.username); });
          resultsPageListEl.appendChild(card);
        });
      }

      searchPageEl.style.display = "none";
      resultsPageEl.style.display = "block";
    }

    function closeResultsPage() {
      resultsPageEl.style.display = "none";
      searchPageEl.style.display = "block";
    }

    let profileFromResults = false;
    function openProfile(workerUsername) {
      currentProfileUsername = workerUsername;
      const w = users[workerUsername];
      if (!w || w.role !== "worker") return;
      const fullName = w.patronymic ? `${w.name} ${w.patronymic}` : (w.name || "Без имени");
      const kindLabel = KIND_LABELS[w.kind] || "Специалист";
      profileNameEl.textContent = fullName;
      profileMetaEl.textContent = `${kindLabel} — ${w.specialty}` + (w.city ? " · " + w.city : "");
      profilePriceEl.textContent = w.price ? w.price + " ₽/час" : "Цена не указана";
      const rating = getAverageRating(workerUsername);
      profileRatingEl.textContent = rating ? "★ " + rating : "Нет отзывов";
      profileAboutEl.textContent = w.about || "Нет описания.";
      profileAboutEl.style.display = (w.about ? "block" : "block");
      const contactParts = [];
      if (w.telegram) {
        const tg = String(w.telegram).trim();
        const tgHref = tg.startsWith("http") ? tg : (tg.startsWith("@") ? "https://t.me/" + tg.slice(1) : "https://t.me/" + tg);
        contactParts.push('Telegram: <a href="' + tgHref + '" target="_blank" rel="noopener">' + escapeHtml(tg) + "</a>");
      }
      if (w.email) {
        const em = String(w.email).trim();
        contactParts.push('Email: <a href="mailto:' + escapeHtml(em) + '">' + escapeHtml(em) + "</a>");
      }
      profileContactEl.innerHTML = contactParts.length ? contactParts.join(" · ") : "Способ связи не указан.";
      profileContactEl.style.display = "block";
      profileFavoriteBtn.textContent = isFavorite(workerUsername) ? "В избранном" : "В избранное";
      profileFavoriteBtn.classList.toggle("in-favorites", isFavorite(workerUsername));
      profileFavoriteBtn.onclick = () => {
        toggleFavorite(workerUsername);
        profileFavoriteBtn.textContent = isFavorite(workerUsername) ? "В избранном" : "В избранное";
        profileFavoriteBtn.classList.toggle("in-favorites", isFavorite(workerUsername));
      };
      const reviews = getReviews(workerUsername);
      profileReviewsEl.innerHTML = "";
      reviews.forEach((r) => {
        const div = document.createElement("div");
        div.className = "review-item";
        div.innerHTML = "<div class=\"review-author\">" + r.author + " · " + r.date + " · ★" + r.rating + "</div><div>" + (r.text || "") + "</div>";
        profileReviewsEl.appendChild(div);
      });
      const isUser = currentUserUsername && users[currentUserUsername] && users[currentUserUsername].role === "user";
      const isSelf = currentUserUsername === workerUsername;
      if (isUser && !isSelf) {
        reviewFormEl.style.display = "block";
        reviewRatingInput.value = 5;
        reviewTextInput.value = "";
        reviewSubmitBtn.onclick = () => {
          const rating = parseInt(reviewRatingInput.value, 10);
          const text = reviewTextInput.value.trim();
          if (rating < 1 || rating > 5) return;
          saveReview(workerUsername, { rating, text });
          reviewTextInput.value = "";
          openProfile(workerUsername);
        };
      } else {
        reviewFormEl.style.display = "none";
      }
      searchPageEl.style.display = "none";
      resultsPageEl.style.display = "none";
      profilePageEl.classList.add("visible");
      profilePageEl.style.display = "block";
    }
    function closeProfile() {
      profilePageEl.classList.remove("visible");
      profilePageEl.style.display = "none";
      if (profileFromResults) resultsPageEl.style.display = "block";
      else searchPageEl.style.display = "block";
    }
    profileBackBtn.addEventListener("click", () => { profileFromResults = false; closeProfile(); });

    searchBtn.addEventListener("click", openResultsPage);
    searchInput.addEventListener("input", performSearch);
    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        openResultsPage();
      }
    });
    resultsBackBtn.addEventListener("click", closeResultsPage);
    favoritesBackBtn.addEventListener("click", () => { hideAllPages(); searchPageEl.style.display = "block"; });

    cabinetKindSelect.addEventListener("change", () => {
      const list = WORKER_SPECIALTIES[cabinetKindSelect.value] || [];
      cabinetSpecialtySelect.innerHTML = "";
      list.forEach((name) => {
        const opt = document.createElement("option");
        opt.value = name; opt.textContent = name;
        cabinetSpecialtySelect.appendChild(opt);
      });
    });
    cabinetSaveBtn.addEventListener("click", () => {
      if (!currentUserUsername) return;
      const w = users[currentUserUsername];
      if (!w || w.role !== "worker") return;
      w.name = cabinetNameInput.value.trim() || w.name;
      w.patronymic = cabinetPatronymicInput.value.trim();
      w.city = cabinetCityInput.value.trim();
      w.price = parseInt(cabinetPriceInput.value, 10) || 0;
      w.about = cabinetAboutInput.value.trim();
      w.kind = cabinetKindSelect.value;
      w.specialty = cabinetSpecialtySelect.value;
      w.telegram = cabinetTelegramInput ? cabinetTelegramInput.value.trim() : "";
      w.email = cabinetEmailInput ? cabinetEmailInput.value.trim() : "";
      if (!Object.prototype.hasOwnProperty.call(BASE_USERS, currentUserUsername)) {
        const extraUsers = { ...users };
        Object.keys(BASE_USERS).forEach((k) => delete extraUsers[k]);
        saveUsers(extraUsers);
      }
      showWorkerCabinet(currentUserUsername);
    });
    cabinetLogoutBtn.addEventListener("click", () => {
      hideAllPages(); cardEl.style.display = "block"; setStatus(""); passwordInput.value = "";
      localStorage.removeItem("current_user"); currentUserUsername = null;
      if (topNavEl) topNavEl.style.display = "none";
    });

    [filterKind, filterCity, filterPriceMin, filterPriceMax, sortBy].forEach((el) => {
      if (el) el.addEventListener("change", performSearch);
      if (el && el.tagName === "INPUT") el.addEventListener("input", performSearch);
    });
  </script>
</body>
</html>
